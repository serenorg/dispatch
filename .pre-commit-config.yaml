# Prek hook configuration (no pre-commit required)
# Install runner: brew install prek   # or see https://prek.j178.dev/installation/
# One-time setup: prek install -f && prek install --hook-type commit-msg
# Run manually:  prek run --all-files
minimum_prek_version: "0.2.0"

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: Remove trailing whitespace
        types: [text]
        exclude: "\\.md$"
      - id: end-of-file-fixer
        name: Ensure files end with newline
        types: [text]
      - id: mixed-line-ending
        name: Fix mixed line endings
        args: [--fix=lf]
      - id: check-yaml
        name: Check YAML syntax
      - id: check-toml
        name: Check TOML syntax
      - id: check-json
        name: Check JSON syntax
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-case-conflict
        name: Check for case conflicts

  # Ensure files comply with .editorconfig (no formatting change, but fails fast)
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.4.1
    hooks:
      - id: editorconfig-checker
        alias: ec
        additional_dependencies: []

  # Conventional commit messages
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict, .git/COMMIT_EDITMSG]
        pass_filenames: false

  # Rust formatting (staged files only)
  - repo: local
    hooks:
      - id: rustfmt-staged
        name: rustfmt (staged files)
        entry: rustfmt
        language: system
        types: [rust]
        pass_filenames: true
        args: ["--edition", "2024"]

  # Rust cargo check (warnings as errors)
  - repo: local
    hooks:
      - id: cargo-check
        name: cargo check (deny warnings)
        entry: sh -c 'RUSTFLAGS="-D warnings" cargo check --workspace'
        language: system
        types: [rust]
        pass_filenames: false

  # Rust clippy (workspace)
  - repo: local
    hooks:
      - id: clippy
        name: clippy (deny warnings)
        entry: cargo clippy --workspace -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

# Exclude files
exclude: |
  (?x)(
    ^target/|
    ^\.git/|
    ^\.agent-shell/
  )
